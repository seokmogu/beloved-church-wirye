name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # dev DB를 공유하므로 통합 테스트가 겹쳐 돌지 않게 한다
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Integration tests (dev DB)
        env:
          POSTGRES_URL: ${{ secrets.DEV_POSTGRES_URL }}
          PAYLOAD_SECRET: ${{ secrets.DEV_PAYLOAD_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm test:int
